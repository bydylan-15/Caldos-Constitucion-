<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - Caldos Constitución</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="notificaciones.css">
</head>
<body>
     <!-- Barra de Navegacion -->
    <header class="header-principal" id="nav-header">
        <nav class="contenedor nav-menu">
            <div class="flex-items-center">
                <a href="index.html#inicio" style="text-decoration: none; color: inherit;">
                    <h1 class="logo-titulo">Caldos <span class="texto-gradiente">Constitución</span></h1>
                </a>
            </div>
            
            <div class="menu-desktop" id="menu-principal">
                <a href="index.html#inicio" class="nav-link">Inicio</a>
                <a href="index.html#menu" class="nav-link">Menú</a>
                <a href="index.html#nosotros" class="nav-link">Nosotros</a>
                <a href="index.html#contacto" class="nav-link">Contacto</a>
            </div>

            <div class="flex-items-center espacio-x-4">

                <div class="notificaciones-container">
                    <button class="btn-notificacion" id="btnNotificacion">
                        <i class="fas fa-bell"></i>
                        <span class="badge-notificacion pulse-slow-animation" id="contadorNotificaciones">0</span>
                    </button>
                    
                    <div class="menu-desplegable menu-notificaciones" id="menuNotificaciones">
                        <div class="usuario-info">
                            <p><strong>Notificaciones</strong></p>
                        </div>
                        <hr>
                        <div class="notificaciones-lista" id="listaNotificaciones">
                            <!-- Se cargan dinámicamente -->
                        </div>
                        <hr>
                        <a href="notificaciones.html"><i class="fas fa-bell"></i> Ver todas</a>
                    </div>
                </div>

                <div class="perfil-container">
                    <button class="btn-perfil" id="btnPerfil">
                        <i class="fas fa-user-circle icono-perfil"></i>
                    </button>
                    <div class="menu-desplegable" id="menuPerfil">
                        <div class="usuario-info">
                            <p><strong>Hola, Usuario</strong></p>
                        </div>
                        <hr>
                        <a href="perfil.html"><i class="fas fa-user"></i> Mi Perfil</a>
                        <a href="#" class="cerrar-sesion" id="logout">
                            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                        </a>
                    </div>
                </div>

                <button id="mobile-menu-button" class="btn-menu-movil">
                    <i class="fas fa-bars icono-menu"></i>
                </button>
            </div>

        </nav>
        <div id="mobile-menu" class="menu-movil-desplegable hidden-mobile">
            <div class="menu-movil-links stagger-animation-group">
                <a href="index.html#inicio" class="menu-movil-link">Inicio</a>
                <a href="index.html#menu" class="menu-movil-link">Menú</a>
                <a href="index.html#nosotros" class="menu-movil-link">Nosotros</a>
                <a href="index.html#contacto" class="menu-movil-link">Contacto</a>

                <div class="dropdown-idioma">
                    <button class="btn-idioma">
                        <i class="fas fa-globe mr-1 icono-giratorio"></i>
                        <span>ES</span>
                        <i class="fas fa-chevron-down ml-1 icono-flecha"></i>
                    </button>
                    <div class="dropdown-contenido">
                        <a href="#" class="dropdown-item">Español</a>
                        <a href="#" class="dropdown-item">English</a>
                        <a href="#" class="dropdown-item">Français</a>
                    </div>
                </div>
            </div>              
        </div>
    </header>

    <main class="contenedor">
        <section class="notificaciones-pagina zoom-in-animation">
            <div class="notificaciones-header-pagina">
                <h2><i class="fas fa-bell mr-3"></i> Mis Notificaciones</h2>
                <button class="btn-marcar-leidas" id="btnMarcarLeidas">
                    <i class="fas fa-check-double"></i> Marcar todas como leídas
                </button>
            </div>

            <div class="notificaciones-filtros">
                <button class="filtro-btn active" data-filtro="todas">
                    Todas <span class="filtro-count" id="countTodas">0</span>
                </button>
                <button class="filtro-btn" data-filtro="no-leidas">
                    No leídas <span class="filtro-count" id="countNoLeidas">0</span>
                </button>
                <button class="filtro-btn" data-filtro="leidas">
                    Leídas <span class="filtro-count" id="countLeidas">0</span>
                </button>
            </div>

            <div class="notificaciones-contenido" id="notificacionesContenido">
                <!-- Las notificaciones se cargarán aquí -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script src="notificaciones.js"></script>
</body>
</html>
